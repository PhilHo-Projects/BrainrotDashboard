name: Deploy Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Set up bash profile to have bun in PATH
            source ~/.bashrc

            # Go to app directory
            cd ~/projects/BrainrotDashboard

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies and build
            ~/.bun/bin/bun install
            ~/.bun/bin/bun run build

            # Check if PM2 process exists, if not start it, else restart
            pm2 describe BrainrotDashboard > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart BrainrotDashboard
            else
                pm2 start ./dist/server/entry.mjs --name BrainrotDashboard
            fi
            
            # Save pm2 state
            pm2 save
